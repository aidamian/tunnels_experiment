name: tunnels-experiment

services:
  dind-host-container:
    build:
      context: .
      dockerfile: docker/dind/Dockerfile
    container_name: dind-host-container
    privileged: true
    env_file:
      - .runtime/dind.env
    environment:
      LOGS_DIR: /logs
    volumes:
      # Runtime state lives under /logs and /var/lib/docker.
      - ./_logs:/logs
      - dind-host-docker:/var/lib/docker
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /logs/raw/$${RUN_TS}_topology_ready.json && jq -e '.all_ready == true' /logs/raw/$${RUN_TS}_topology_ready.json >/dev/null
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: unless-stopped

volumes:
  dind-host-docker:
